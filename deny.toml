[graph]
all-features = true

[licenses]
version = 2
allow = [
    "Apache-2.0",
    "BSD-2-Clause",
    "MIT",
    "Unicode-3.0",
]

[advisories]
version = 2
yanked = "deny"

[bans]
multiple-versions = "warn"
wildcards = "deny"
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
